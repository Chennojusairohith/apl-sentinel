<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APL | Command Sentinel v1.3</title>
    <style>
        :root { --bg: #050505; --accent-red: #ff3333; --accent-green: #00ffa3; --text: #f0f0f0; --panel: #111111; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; flex-direction: column; }
        
        #main-container { display: flex; flex-grow: 1; overflow: hidden; }
        #sidebar { width: 380px; background: var(--panel); border-right: 1px solid #222; padding: 25px; box-sizing: border-box; z-index: 10; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--accent-green); outline: none; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: var(--accent-green); border: none; color: #000; font-weight: bold; cursor: pointer; }
        
        #map-area { flex-grow: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); }
        .globe-ui { width: 400px; height: 400px; border-radius: 50%; border: 1px solid #222; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 100px rgba(0, 255, 163, 0.05); }
        #temp-val { font-size: 5rem; margin: 0; font-weight: bold; }
        
        /* DYNAMIC NEWS TICKER */
        #ticker-container {
            width: 100%;
            background: #000;
            border-top: 1px solid var(--accent-green);
            height: 45px;
            display: flex;
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
            transition: 0.5s; /* Smooth color change */
        }

        .ticker-label {
            background: var(--accent-green);
            color: #000;
            padding: 0 20px;
            font-weight: bold;
            height: 100%;
            display: flex;
            align-items: center;
            z-index: 20;
        }

        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-move 80s linear infinite;
            font-size: 0.95rem;
            color: var(--accent-green);
        }

        @keyframes ticker-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* CRITICAL MODE COLORS */
        .critical-mode { border-top-color: var(--accent-red) !important; }
        .critical-mode .ticker-label { background: var(--accent-red) !important; color: white; }
        .critical-mode .ticker-text { color: var(--accent-red) !important; font-weight: bold; }

        .anomaly-card { background: #1a1a1a; border-left: 5px solid var(--accent-red); padding: 15px; margin-top: 20px; }
        .reward-box { position: absolute; bottom: 60px; right: 30px; padding: 15px; border: 1px solid #333; background: rgba(0,0,0,0.8); font-size: 0.7rem; line-height: 1.5; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="sidebar">
        <h1 style="color: var(--accent-green); margin: 0; font-size: 1.2rem;">APL :: SENTINEL</h1>
        <p style="color: #444; font-size: 0.6rem; margin-bottom: 20px;">MARCH 31, 2026 | LIVE STREAM</p>

        <input type="text" id="citySearch" placeholder="ENTER CITY (e.g. Vijayawada)">
        <button onclick="scanAtmosphere()">INITIATE SCAN</button>

        <div id="feed-container"></div>
    </div>

    <div id="map-area">
        <div class="reward-box" id="global-status">
            ARCHITECT: <span id="user-rank" style="color: #444;">DISCONNECTED</span><br>
            GLOBAL PATCHES: <span id="global-count" style="color:var(--accent-green)">LOADING...</span>
        </div>

        <div class="globe-ui">
            <div id="temp-val">--</div>
            <div id="location-tag" style="color: #444; letter-spacing: 3px; font-size: 0.8rem;">STANDBY</div>
        </div>
    </div>
</div>

<div id="ticker-container">
    <div class="ticker-label" id="ticker-label">LIVE FEED</div>
    <div class="ticker-text" id="news-ticker-content">
        </div>
</div>

<script>
    const PROJECT_ID = "apl_ledger_2026"; 

    // TODAY'S REAL NEWS (March 31, 2026)
    const newsHeadlines = [
        "[COUNTRY] First Digital Census phase begins across 8 locations tomorrow.",
        "[LOCAL] LWE declared 'Zero' in Andhra Pradesh; DGP confirms end of era.",
        "[CRITICAL] EXPLOSION reported at Challapalli Police Station, Krishna district; 4 injured.",
        "[LOCAL] Vijayawada Kanaka Durga temple staff caught in gold diversion attempt.",
        "[WORLD] 7.0 Magnitude Earthquake strikes Vanuatu Islands; Tsunami alert monitored.",
        "[ECONOMY] New Income Tax Act 2025 goes live tomorrow; Tax offices open today.",
        "[CRITICAL] LANDSLIDE blocks Jammu-Srinagar Highway at Mehar area.",
        "[VEDAS] 'Karmanye vadhikaraste ma phaleshu kadachana' - Perform your duty, detach from rewards."
    ];

    window.onload = () => {
        loadNews();
        updateCounter();
    };

    function loadNews() {
        const ticker = document.getElementById('news-ticker-content');
        const container = document.getElementById('ticker-container');
        const label = document.getElementById('ticker-label');
        
        const fullText = newsHeadlines.join(" | ");
        ticker.innerText = fullText;

        // CRITICAL CHECK: Turn red if danger keywords found
        const criticalKeywords = ["EXPLOSION", "CRITICAL", "EARTHQUAKE", "LANDSLIDE", "ATTACK"];
        if (criticalKeywords.some(key => fullText.toUpperCase().includes(key))) {
            container.classList.add('critical-mode');
            label.innerText = "CRITICAL ALERT";
        }
    }

    async function updateCounter() {
        try {
            const res = await fetch(`https://api.countapi.xyz/get/${PROJECT_ID}/patches`);
            const data = await res.json();
            document.getElementById('global-count').innerText = data.value || "0";
        } catch (e) { document.getElementById('global-count').innerText = "ONLINE"; }
    }

    async function scanAtmosphere() {
        const city = document.getElementById('citySearch').value;
        const feed = document.getElementById('feed-container');
        if (!city) return;

        try {
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&format=json`);
            const geoData = await geoRes.json();
            const { latitude, longitude, name } = geoData.results[0];

            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
            const weatherData = await weatherRes.json();
            const temp = Math.round(weatherData.current_weather.temperature);

            document.getElementById('temp-val').innerText = temp + "°";
            document.getElementById('location-tag').innerText = name.toUpperCase();

            if (temp >= 38) {
                feed.innerHTML = `
                    <div class="anomaly-card">
                        <span style="color: var(--accent-red)">[!] THERMAL ANOMALY</span><br>
                        <p style="font-size: 0.7rem;">High heat in ${name}. Vulnerable populations active.</p>
                        <button onclick="patchAndSync(this)" style="background: var(--accent-red); color: white;">PATCH NODE</button>
                    </div>`;
            } else {
                feed.innerHTML = `<div class="anomaly-card" style="border-left-color: var(--accent-green)"><span style="color: var(--accent-green)">[✓] STABLE REGION</span></div>`;
            }
        } catch (err) { feed.innerHTML = `<p style="color:red">SCAN ERROR</p>`; }
    }

    async function patchAndSync(btn) {
        btn.innerText = "UPLOADING...";
        try {
            const response = await fetch(`https://api.countapi.xyz/hit/${PROJECT_ID}/patches`);
            const data = await response.json();
            document.getElementById('global-count').innerText = data.value;
            document.getElementById('user-rank').innerHTML = '<span style="color: var(--accent-green);">LVL 1 ARCHITECT</span>';
            btn.innerText = "PATCHED";
        } catch (err) { btn.innerText = "PATCHED (LOCAL)"; }
    }
</script>

</body>
</html>
