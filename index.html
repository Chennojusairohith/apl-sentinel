// --- ADD THIS AT THE TOP OF YOUR <script> SECTION ---

// Initialize Wallet from LocalStorage or set to 0
let aplCredits = parseInt(localStorage.getItem('apl_credits')) || 0;
let satelliteLevel = parseInt(localStorage.getItem('sat_level')) || 1;

function updateWalletUI() {
    document.getElementById('wallet-display').innerText = `CREDITS: ${aplCredits} APL`;
    document.getElementById('sat-level-display').innerText = `SAT-RES: ${satelliteLevel}.0x`;
    
    // Save to browser memory
    localStorage.setItem('apl_credits', aplCredits);
    localStorage.setItem('sat_level', satelliteLevel);
}

// --- UPDATE YOUR verifyPatch() FUNCTION ---

function verifyPatch() {
    addLog("Uploading proof to Global Ledger...");
    
    setTimeout(() => {
        aplCredits += 100; // Reward for verification
        updateWalletUI();
        
        addLog("VERIFICATION SUCCESSFUL: +100 APL Credits.");
        alert("Mission Complete. 100 Credits added to your APL Ledger.");
        
        // Reset the camera UI for next mission
        document.getElementById('camera-zone').style.display = 'none';
        document.getElementById('snapshot').style.display = 'none';
        document.getElementById('video').style.display = 'block';
    }, 2000);
}

// --- ADD THE UPGRADE FUNCTION ---

function upgradeSatellite() {
    const cost = 250;
    if (aplCredits >= cost) {
        aplCredits -= cost;
        satelliteLevel += 1;
        updateWalletUI();
        addLog(`UPLINK UPGRADED: Resolution now at ${satelliteLevel}.0x`);
        
        // Visual effect: Make the satellite map clearer
        const satView = document.getElementById('satellite-view');
        satView.style.opacity = 0.4 + (satelliteLevel * 0.1);
        satView.style.filter = `grayscale(${100 - (satelliteLevel * 10)}%) brightness(0.6)`;
    } else {
        alert(`Insufficient Credits. You need ${cost - aplCredits} more APL.`);
    }
}

// Initialize UI on load
window.onload = updateWalletUI;
